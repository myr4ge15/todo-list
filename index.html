<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Todo List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>✨ Мои задачи</h1>
    
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Что нужно сделать?">
        <button id="add-btn">+</button>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">В процессе</button>
        <button class="filter-btn" data-filter="completed">Готово</button>
        <button class="filter-btn" data-filter="cancelled">Отменено</button>
    </div>

    <ul id="todo-list"></ul>
    
    <div id="empty-state" class="empty-state">
        Список пуст 🍃
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
