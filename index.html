<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Task Tracker">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🚀 Трекер Задач</h1>
    
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Новая задача...">
        <button id="add-btn">+</button>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="backlog">Бэклог</button>
        <button class="filter-btn" data-filter="in_progress">В работе</button>
        <button class="filter-btn" data-filter="completed">Готово</button>
        <button class="filter-btn" data-filter="cancelled">Отмена</button>
    </div>

    <ul id="todo-list"></ul>

    <div id="empty-state" class="empty-state">
        Список пуст 🍃
    </div>

    <div class="data-actions">
        <button id="export-btn" class="data-btn" title="Скачать задачи в JSON">⬇️ Экспорт</button>
        <button id="import-btn" class="data-btn" title="Загрузить задачи из JSON">⬆️ Импорт</button>
        <input type="file" id="import-file" accept="application/json,.json" hidden>
    </div>
</div>

<!-- Модальное окно результата -->
<div id="result-modal" class="modal">
    <div class="modal-content">
        <h3>Результат работы</h3>
        <p>Что было сделано? (макс. 50 симв.)</p>
        <input type="text" id="result-input" maxlength="50" placeholder="Например: Макет утвержден">
        <div class="modal-actions">
            <button id="cancel-result-btn" class="btn-secondary">Отмена</button>
            <button id="save-result-btn" class="btn-primary">Сохранить</button>
        </div>
    </div>
</div>

<!-- Модальное окно подтверждения удаления -->
<div id="confirm-modal" class="modal">
    <div class="modal-content">
        <h3>Удалить задачу?</h3>
        <p>Это действие нельзя отменить.</p>
        <div class="modal-actions">
            <button id="cancel-delete-btn" class="btn-secondary">Нет</button>
            <button id="confirm-delete-btn" class="btn-danger">Да, удалить</button>
        </div>
    </div>
</div>

<!-- Модальное окно просмотра полного результата -->
<div id="view-result-modal" class="modal">
    <div class="modal-content">
        <h3>Итог задачи</h3>
        <p id="full-result-text" class="full-result-display"></p>
        <div class="modal-actions">
            <button onclick="closeModal('view-result-modal')" class="btn-primary">Закрыть</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    // Регистрация service worker (относительный путь — для GitHub Pages /todo-list/)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch((err) => {
                console.error('Не удалось зарегистрировать service worker:', err);
            });
        });
    }
</script>
</body>
</html>
